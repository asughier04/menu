<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو مطعم لاقونا | Laguna Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Rakkas&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal-deep: #0a3538;
            --teal: #0f4548;
            --green: #1fa14b;
            --green-deep: #167a39;
            --sand: #f6f1e3;
            --sand-dark: #ece3cd;
            --card: #ffffff;
            --ink: #182726;
            --muted: #6d7c7a;
            --coral: #ff6b4a;
            --coral-deep: #e6522e;
            --gold: #cf9a42;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--sand);
            color: var(--ink);
            padding-bottom: 60px;
            background-image:
                radial-gradient(circle at 15% 8%, rgba(31,161,75,0.06), transparent 40%),
                radial-gradient(circle at 90% 15%, rgba(255,107,74,0.06), transparent 35%);
        }

        /* --- Header --- */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(155deg, var(--teal-deep) 0%, var(--teal) 65%, var(--green-deep) 130%);
            text-align: center;
            padding: 30px 20px 40px;
        }

        .brand-mark {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .brand-name {
            font-family: 'Rakkas', serif;
            font-size: clamp(2.2rem, 8vw, 2.8rem);
            color: #f6f1e3;
            letter-spacing: 1px;
            line-height: 1;
            text-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }

        .brand-sub {
            font-size: 0.72rem;
            letter-spacing: 4px;
            color: #a9d8bd;
            text-transform: uppercase;
            font-weight: 600;
        }

        .brand-rule {
            width: 46px;
            height: 3px;
            background: var(--coral);
            border-radius: 3px;
            margin-top: 10px;
        }

        .header-wave {
            display: block;
            width: 100%;
            height: 34px;
            margin-bottom: -1px;
        }

        /* --- Search --- */
        .search-wrap {
            max-width: 600px;
            margin: -22px auto 0;
            padding: 0 16px;
            position: relative;
            z-index: 20;
        }

        .search-box {
            width: 100%;
            background: var(--card);
            border: none;
            border-radius: 14px;
            padding: 14px 46px 14px 16px;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            box-shadow: 0 8px 20px rgba(10,53,56,0.18);
            outline: none;
            transition: box-shadow 0.25s;
        }

        .search-box:focus {
            box-shadow: 0 8px 24px rgba(10,53,56,0.28), 0 0 0 2px var(--green);
        }

        .search-icon {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            opacity: 0.45;
            pointer-events: none;
        }

        /* --- Category Navigation --- */
        .category-nav {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 18px 16px 8px;
            max-width: 600px;
            margin: 0 auto;
            scroll-behavior: smooth;
        }

        .category-nav::-webkit-scrollbar { display: none; }

        .category-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card);
            border: 1px solid var(--sand-dark);
            color: var(--teal-deep);
            padding: 9px 16px;
            border-radius: 999px;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: 0.25s;
            flex-shrink: 0;
        }

        .category-btn .icon { font-size: 1rem; }

        .category-btn.active {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
            box-shadow: 0 6px 14px rgba(31,161,75,0.3);
        }

        /* --- Menu Content --- */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 10px 16px 0;
        }

        .category-section {
            margin-bottom: 30px;
            display: none;
            animation: fadeIn 0.35s ease-in-out;
        }

        .category-section.active,
        .category-section.force-show {
            display: block;
        }

        .section-title-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--sand-dark);
        }

        .section-title {
            font-family: 'Rakkas', serif;
            color: var(--teal-deep);
            font-size: 1.55rem;
        }

        .section-count {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 600;
            background: var(--sand-dark);
            padding: 2px 10px;
            border-radius: 999px;
            margin-right: auto;
        }

        .menu-item {
            background: var(--card);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 10px rgba(10,53,56,0.06);
            border-right: 4px solid transparent;
            transition: 0.25s;
        }

        .menu-item:hover {
            border-right-color: var(--coral);
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(10,53,56,0.1);
        }

        .item-info { flex: 1; min-width: 0; }

        .item-name {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--teal-deep);
        }

        .item-desc {
            font-size: 0.83rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .item-price {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--coral-deep);
            background: #fff0eb;
            padding: 7px 14px;
            border-radius: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .item-price::after {
            content: ' د.ل';
            font-size: 0.68rem;
            font-weight: 600;
            opacity: 0.75;
        }

        .no-results {
            text-align: center;
            color: var(--muted);
            padding: 50px 20px;
            font-size: 0.95rem;
            display: none;
        }

        .no-results.show { display: block; }

        footer {
            text-align: center;
            margin-top: 30px;
            padding: 24px 16px 6px;
            color: var(--muted);
            font-size: 0.85rem;
        }

        footer .foot-brand {
            font-family: 'Rakkas', serif;
            color: var(--teal-deep);
            font-size: 1.1rem;
            display: block;
            margin-bottom: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-mark">
            <span class="brand-name">لاقونا</span>
            <span class="brand-sub">LAGUNA RESTAURANT</span>
            <div class="brand-rule"></div>
        </div>
        <!-- لإضافة شعاركم الفعلي: استبدلوا brand-mark أعلاه بـ <img src="اسم-الملف.png" class="logo"> بعد رفع الصورة -->
    </header>
    <svg class="header-wave" viewBox="0 0 600 34" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,0 C100,34 200,0 300,17 C400,34 500,0 600,17 L600,34 L0,34 Z" fill="#f6f1e3"></path>
    </svg>

    <div class="search-wrap">
        <input type="text" class="search-box" id="search-input" placeholder="ابحث عن صنف... (بيتزا، برجر، سلطة)">
        <span class="search-icon">🔍</span>
    </div>

    <nav class="category-nav" id="nav-container"></nav>

    <div class="container" id="menu-container"></div>
    <p class="no-results" id="no-results">لا توجد أصناف مطابقة لبحثك 🍽️</p>

    <footer>
        <span class="foot-brand">لاقونا</span>
        بالهناء والشفاء
    </footer>

    <script>
        // --- قاعدة بيانات المنيو ---
        const menuData = [
            {
                category: "بيتزا - حجم كبير",
                icon: "🍕",
                items: [
                    { name: "بيتزا مارغريتا", desc: "صلصة + طماطم + جبنة", price: "19" },
                    { name: "بيتزا خضروات", desc: "صلصة فلفل حلو ألوان + طماطم + فقاع", price: "22" },
                    { name: "بيتزا الأجبان الأربعة", desc: "أربع أنواع من الجبنة + صلصة", price: "27" },
                    { name: "بيتزا مفروم لحم", desc: "لحم مفروم متبل + طماطم + جبنة + فلفل حلو", price: "27" },
                    { name: "بيتزا دجاج", desc: "دجاج متبل + فلفل حلو + طماطم + جبنة + صلصة", price: "27" },
                    { name: "بيتزا مرقاز", desc: "قطع مرقاز + زيتون أسود + صوص باربيكيو + جبنة", price: "30" },
                    { name: "بيتزا كباب لحم", desc: "سيخ كباب + زيتون + طماطم + جبنة", price: "30" },
                    { name: "بيتزا سلامي", desc: "شرائح سلامي + فلفل حلو + صلصة طماطم + جبنة", price: "28" },
                    { name: "بيتزا موجة حارة", desc: "دجاج متبل حار + فلفل حار + صلصة طماطم + جبنة", price: "27" },
                    { name: "بيتزا سموكي", desc: "شرائح سلامي + دجاج مشوي مدخن + صلصة طماطم + جبنة + فلفل حلو", price: "29" }
                ]
            },
            {
                category: "المعجنات",
                icon: "🥐",
                items: [
                    { name: "مقلوبة دجاج", desc: "دجاج + بطاطا + أجبان + صوص + كاتشب", price: "19" },
                    { name: "مقلوبة لحم", desc: "لحم مفروم + بطاطا + أجبان + صوص + كاتشب", price: "20" },
                    { name: "مقلوبة كبدة عجل", desc: "لحم مفروم + بطاطا + أجبان + صوص", price: "27" },
                    { name: "باقيت دجاج", desc: "دجاج + جبنة + بطاطا + صوصات", price: "22" },
                    { name: "باقيت لحم", desc: "لحم مفروم + جبنة + بطاطا + صوصات", price: "24" },
                    { name: "باقيت كبدة عجل", desc: "كبدة + جبنة + بطاطا + صوصات", price: "28" },
                    { name: "كبدة فرن", desc: "كبدة + جبنة + بطاطا + صوصات", price: "28" },
                    { name: "فاهيتا فرن", desc: "فاهيتا + جبنة + بطاطا + صوصات", price: "23" }
                ]
            },
            {
                category: "سندوتشات",
                icon: "🥪",
                items: [
                    { name: "تشكن فيليه", desc: "شريحة دجاج مشوية + خس + طماطم + صوص", price: "15" },
                    { name: "تشكن لاقونا", desc: "شريحة دجاج مشوية مع قطع الدجاج + الخضار", price: "22" },
                    { name: "تشكن كرانش", desc: "شريحة دجاج كرسبي + خس + طماطم + صوص التاكسس", price: "16" },
                    { name: "كباب دجاج", desc: "سيخ كباب دجاج + خس + طماطم + معدنوس", price: "14" },
                    { name: "كفتة لحم بالجبنة", desc: "2 قطع كفتة محشوة جبن + صوص + مايونيز", price: "15" },
                    { name: "تشكن فاهيتا", desc: "قطع مشوية + صوص الفاهيتا + جبنة شرائح", price: "14" },
                    { name: "كبدة اسكندراني", desc: "قطع كبدة متبلة ومشوية مع المايونيز", price: "20" },
                    { name: "تشكن لودر", desc: "شريحة دجاج مقرمش + فلفل مخلل + صوص الساموراي", price: "17" },
                    { name: "طابونة دجاج", desc: "قطع دجاج مشوية + زيتون شرائح + صوص", price: "14" },
                    { name: "طابونة كبدة", desc: "قطع كبدة مشوية + بصل + صوص + جبنة", price: "20" }
                ]
            },
            {
                category: "سندوتشات VIP",
                icon: "👑",
                items: [
                    { name: "تشكن سموكي", desc: "شريحتين دجاج مشوي بخبز التورتيلا + صوص السموكي", price: "22" },
                    { name: "تشكن كرسبي", desc: "شريحتين دجاج كرسبي بخبز التورتيلا يصنع في الفرن", price: "26" },
                    { name: "سبيشل تشكن", desc: "دجاج مقرمش تورتيلا + جبنة شرائح + خس + كاتشب", price: "17" }
                ]
            },
            {
                category: "برجر",
                icon: "🍔",
                items: [
                    { name: "كلاسيك برجر لحم", desc: "شريحة لحم + خس + طماطم + صوص جبنة", price: "15" },
                    { name: "برجر دجاج", desc: "شريحة دجاج مفروم + خس + طماطم + صوص", price: "14" },
                    { name: "برجر دجاج دبل", desc: "شريحتين دجاج + خس + طماطم + صوص", price: "20" },
                    { name: "برجر لحم دبل", desc: "شريحتين لحم + خس + طماطم + صوص", price: "17" },
                    { name: "برجر ديلوكس", desc: "شريحة برجر لحم وطني + فقاع + صوص ديلوكس", price: "20" },
                    { name: "إسكالوب", desc: "شرائح دجاج مقلي + بطاطا + صوص جبنة", price: "15" }
                ]
            },
            {
                category: "وجبات مشوية",
                icon: "🍢",
                items: [
                    { name: "فيلي دجاج", desc: "2 شريحة دجاج + أرز + بطاطا + سلاطة", price: "32" },
                    { name: "وجبة شيش طاووق", desc: "2 سيخ دجاج + بطاطا + سلاطة", price: "32" },
                    { name: "وجبة كباب دجاج / لحم", desc: "2 سيخ كباب + أرز + بطاطا + سلاطة", price: "30" },
                    { name: "مكس كباب", desc: "سيخ كباب + سيخ دجاج + أرز + بطاطا", price: "32" },
                    { name: "فخد دجاج مسحب", desc: "2 فخد دجاج + أرز + بطاطا + سلاطة", price: "33" },
                    { name: "كبدة اسكندراني عجل", desc: "كبدة اسكندراني + أرز + بطاطا + سلاطة", price: "50" },
                    { name: "نص دجاجة مشوية", desc: "نص دجاجة مشوية + أرز + بطاطا + سلاطة", price: "33" },
                    { name: "مشاوي لاقونا", desc: "2 سيخ كبدة + 2 كباب + 2 فيلي + 2 كفتة + مرقاز", price: "270" }
                ]
            },
            {
                category: "وجبات كنتاكي وستربس",
                icon: "🍗",
                items: [
                    { name: "وجبة كنتاكي 3 قطع", desc: "3 قطع دجاج + أرز + بطاطا + كول سلو + صوص", price: "30" },
                    { name: "وجبة كنتاكي 6 قطع", desc: "6 قطع دجاج + أرز + بطاطا + كول سلو + صوص", price: "55" },
                    { name: "وجبة ستربس 5 قطع", desc: "5 قطع ستربس + أرز + بطاطا + كول سلو + صوص", price: "30" },
                    { name: "وجبة ستربس 10 قطع", desc: "10 قطع ستربس + أرز + بطاطا + كول سلو + صوص", price: "55" }
                ]
            },
            {
                category: "سلطات ومقبلات",
                icon: "🥗",
                items: [
                    { name: "شوربة عدس / حلقات بصل", desc: "مقبلات", price: "5" },
                    { name: "بطاطا متوسطة / أصابع الجبنة", desc: "مقبلات", price: "10" },
                    { name: "ناتشوز ببطاطا", desc: "مقبلات", price: "17" },
                    { name: "سلطة بابا غنوج / مشوية", desc: "سلطات طازجة", price: "10" },
                    { name: "سلطة الطماطم المتبل", desc: "سلطات طازجة", price: "19" },
                    { name: "سلطة مشكل", desc: "تشكيلة سلطات", price: "25" }
                ]
            }
        ];

        const navContainer = document.getElementById('nav-container');
        const menuContainer = document.getElementById('menu-container');
        const searchInput = document.getElementById('search-input');
        const noResults = document.getElementById('no-results');

        menuData.forEach((categoryData, index) => {
            const btn = document.createElement('button');
            btn.className = `category-btn ${index === 0 ? 'active' : ''}`;
            btn.innerHTML = `<span class="icon">${categoryData.icon}</span><span>${categoryData.category}</span>`;
            btn.onclick = () => showCategory(index);
            navContainer.appendChild(btn);

            const section = document.createElement('div');
            section.className = `category-section ${index === 0 ? 'active' : ''}`;
            section.id = `section-${index}`;

            const titleRow = document.createElement('div');
            titleRow.className = 'section-title-row';
            titleRow.innerHTML = `
                <h2 class="section-title">${categoryData.icon} ${categoryData.category}</h2>
                <span class="section-count">${categoryData.items.length} صنف</span>
            `;
            section.appendChild(titleRow);

            categoryData.items.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'menu-item';
                itemDiv.dataset.search = (item.name + ' ' + item.desc).toLowerCase();
                itemDiv.innerHTML = `
                    <div class="item-info">
                        <h3 class="item-name">${item.name}</h3>
                        <p class="item-desc">${item.desc}</p>
                    </div>
                    <div class="item-price">${item.price}</div>
                `;
                section.appendChild(itemDiv);
            });

            menuContainer.appendChild(section);
        });

        function showCategory(activeIndex) {
            document.querySelectorAll('.category-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === activeIndex);
            });
            document.querySelectorAll('.category-section').forEach((section, idx) => {
                section.classList.toggle('active', idx === activeIndex);
            });
        }

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.trim().toLowerCase();
            const sections = document.querySelectorAll('.category-section');
            const navButtons = document.querySelectorAll('.category-btn');

            if (query === '') {
                navContainer.style.display = 'flex';
                sections.forEach(s => s.classList.remove('force-show'));
                document.querySelectorAll('.menu-item').forEach(i => i.style.display = 'flex');
                const activeIdx = [...navButtons].findIndex(b => b.classList.contains('active'));
                showCategory(activeIdx >= 0 ? activeIdx : 0);
                noResults.classList.remove('show');
                return;
            }

            navContainer.style.display = 'none';
            let totalMatches = 0;

            sections.forEach(section => {
                let matchesInSection = 0;
                section.querySelectorAll('.menu-item').forEach(item => {
                    const match = item.dataset.search.includes(query);
                    item.style.display = match ? 'flex' : 'none';
                    if (match) { matchesInSection++; totalMatches++; }
                });
                section.classList.toggle('force-show', matchesInSection > 0);
                section.classList.remove('active');
            });

            noResults.classList.toggle('show', totalMatches === 0);
        });
    </script>
</body>
</html>
