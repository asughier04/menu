<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو مطعم لاقونا | Laguna Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-green: #1fa14b; /* لون شعار لاقونا */
            --brand-dark: #111111;
            --bg-color: #f8f5ee; /* لون مقارب لخلفية المنيو الورقي */
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        /* --- Header & Logo --- */
        header {
            background-color: var(--brand-dark);
            text-align: center;
            padding: 25px 20px;
            border-bottom: 5px solid var(--brand-green);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgb(222, 221, 221);
        }

        .logo {
            max-width: 180px;
            height: auto;
        }

        /* --- Category Navigation --- */
        .category-nav {
            display: flex;
            overflow-x: auto;
            background: var(--card-bg);
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            scroll-behavior: smooth;
        }

        .category-nav::-webkit-scrollbar {
            display: none; /* إخفاء شريط التمرير للهواتف */
        }

        .category-btn {
            background: var(--bg-color);
            border: 1px solid #ddd;
            color: var(--brand-dark);
            padding: 8px 16px;
            margin-left: 10px;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .category-btn.active {
            background: var(--brand-green);
            color: white;
            border-color: var(--brand-green);
        }

        /* --- Menu Content --- */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .category-section {
            margin-bottom: 35px;
            display: none; /* سيتم إظهار القسم النشط عبر الجافاسكريبت */
            animation: fadeIn 0.4s ease-in-out;
        }

        .category-section.active {
            display: block;
        }

        .section-title {
            color: var(--brand-dark);
            border-bottom: 3px solid var(--brand-green);
            padding-bottom: 8px;
            margin-bottom: 15px;
            font-size: 1.4rem;
            display: inline-block;
        }

        .menu-item {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border-right: 4px solid transparent;
            transition: 0.3s;
        }

        .menu-item:hover {
            border-right-color: var(--brand-green);
        }

        .item-info {
            flex: 1;
            padding-left: 15px;
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--brand-dark);
        }

        .item-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .item-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--brand-green);
            background: #eafbf0;
            padding: 5px 12px;
            border-radius: 6px;
            white-space: nowrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>

        // بناء الواجهة بناءً على البيانات
        menuData.forEach((categoryData, index) => {
            // 1. إنشاء أزرار التصنيفات
            const btn = document.createElement('button');
            btn.className = `category-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = categoryData.category;
            btn.onclick = () => showCategory(index);
            navContainer.appendChild(btn);

            // 2. إنشاء أقسام المنيو
            const section = document.createElement('div');
            section.className = `category-section ${index === 0 ? 'active' : ''}`;
            section.id = `section-${index}`;
            
            const title = document.createElement('h2');
            title.className = 'section-title';
            title.innerText = categoryData.category;
            section.appendChild(title);

            categoryData.items.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'menu-item';
                itemDiv.innerHTML = `
                    <div class="item-info">
                        <h3 class="item-name">${item.name}</h3>
                        <p class="item-desc">${item.desc}</p>
                    </div>
                    <div class="item-price">${item.price} د.ل</div>
                `;
                section.appendChild(itemDiv);
            });

            menuContainer.appendChild(section);
        });

        // دالة التبديل بين الأقسام
        function showCategory(activeIndex) {
            // تحديث الأزرار
            document.querySelectorAll('.category-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === activeIndex);
            });
            // تحديث الأقسام المعروضة
            document.querySelectorAll('.category-section').forEach((section, idx) => {
                section.classList.toggle('active', idx === activeIndex);
            });
        }
    </script>
</body>
</html>
