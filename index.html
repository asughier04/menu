<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نموذج قائمة هادئة | Demo Menu Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf8f4;
    --ink:#2c2823;
    --muted:#9a9184;
    --label:#eee8de;
    --plate-a:#fdfcfa;
    --plate-b:#efe9de;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif;}
  body{
    background:var(--bg);
    color:var(--ink);
    padding:50px 20px 90px;
  }
  .wrap{max-width:460px;margin:0 auto;}

  .top-note{
    text-align:center;
    font-size:0.72rem;
    letter-spacing:2px;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:56px;
  }

  .dish{
    position:relative;
    margin-bottom:96px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .dish:last-child{margin-bottom:0;}

  .plate-shadow{
    position:absolute;
    bottom:14px;
    width:70%;
    height:22px;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0.16) 0%, rgba(0,0,0,0) 72%);
    z-index:1;
  }

  .plate{
    width:220px;
    height:220px;
    border-radius:50%;
    background:
      radial-gradient(circle at 38% 32%, var(--plate-a) 0%, var(--plate-a) 46%, var(--plate-b) 100%);
    box-shadow:
      0 30px 45px -20px rgba(30,25,18,0.28),
      inset 0 0 0 1px rgba(0,0,0,0.04);
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .plate svg{width:62%;height:62%;}

  .label-box{
    position:relative;
    z-index:3;
    background:var(--label);
    padding:14px 26px;
    margin-top:-26px;
    align-self:flex-end;
    margin-left: 6%;
    text-align:center;
    box-shadow:0 10px 22px -8px rgba(30,25,18,0.18);
    min-width:150px;
  }
  .dish:nth-child(even) .label-box{
    align-self:flex-start;
    margin-left:0;
    margin-right:6%;
  }

  .item-name{
    font-family:'Amiri', serif;
    font-style:italic;
    font-weight:700;
    font-size:1.15rem;
    line-height:1.35;
  }
  .item-price{
    font-family:'Cairo',sans-serif;
    font-weight:500;
    font-size:0.72rem;
    color:var(--muted);
    margin-top:5px;
    letter-spacing:0.5px;
  }

  footer{
    text-align:center;
    margin-top:60px;
    font-size:0.72rem;
    color:var(--muted);
    letter-spacing:1px;
  }
</style>
</head>
<body>
<div class="wrap">

  <p class="top-note">نموذج قائمة &mdash; بيانات وصور تجريبية</p>

  <!-- 1 -->
  <div class="dish">
    <div class="plate-shadow"></div>
    <div class="plate">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 30 L68 30 L64 82 L36 82 Z" fill="none" stroke="#c9c0af" stroke-width="1.6"/>
        <path d="M35 78 L65 78 L63 62 L37 62 Z" fill="#d8b98f"/>
        <path d="M36 60 L64 60 L62.5 46 L37.5 46 Z" fill="#eee0c8"/>
        <path d="M37.5 44 L62.5 44 L61 32 L39 32 Z" fill="#d8b98f"/>
        <path d="M34 28 C40 20 60 20 66 28 C60 26 40 26 34 28 Z" fill="#fbf7ee"/>
        <circle cx="44" cy="24" r="3" fill="#b23a4e"/>
        <circle cx="50" cy="21" r="3" fill="#b23a4e"/>
        <circle cx="56" cy="24" r="3" fill="#b23a4e"/>
        <path d="M50 18 q3 -4 6 -1" stroke="#5c7a4a" stroke-width="1.4" fill="none"/>
      </svg>
    </div>
    <div class="label-box">
      <div class="item-name">بارفيه الفانيليا<br>والتوت</div>
      <div class="item-price">18 د.ل</div>
    </div>
  </div>

  <!-- 2 -->
  <div class="dish">
    <div class="plate-shadow"></div>
    <div class="plate">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="70" rx="26" ry="7" fill="#d8b98f"/>
        <ellipse cx="50" cy="61" rx="25" ry="7" fill="#e3c69c"/>
        <ellipse cx="50" cy="52" rx="24" ry="7" fill="#d8b98f"/>
        <ellipse cx="50" cy="43" rx="23" ry="7" fill="#ecd2a9"/>
        <path d="M30 40 C40 34 60 34 70 40" stroke="#fbf7ee" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="40" cy="36" r="2.6" fill="#37455c"/>
        <circle cx="47" cy="33" r="2.6" fill="#37455c"/>
        <circle cx="54" cy="36" r="2.6" fill="#37455c"/>
      </svg>
    </div>
    <div class="label-box">
      <div class="item-name">بان كيك بالفانيليا</div>
      <div class="item-price">14 د.ل</div>
    </div>
  </div>

  <!-- 3 -->
  <div class="dish">
    <div class="plate-shadow"></div>
    <div class="plate">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect x="28" y="40" width="44" height="26" rx="2" fill="#c9862f"/>
        <rect x="28" y="40" width="44" height="26" rx="2" fill="url(#brulee)" opacity="0.55"/>
        <defs>
          <radialGradient id="brulee" cx="30%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#5c3a15"/>
            <stop offset="100%" stop-color="#c9862f" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="38" cy="47" r="2" fill="#5c3a15" opacity="0.5"/>
        <circle cx="55" cy="50" r="1.6" fill="#5c3a15" opacity="0.5"/>
        <circle cx="62" cy="44" r="1.8" fill="#5c3a15" opacity="0.5"/>
        <line x1="76" y1="38" x2="80" y2="70" stroke="#2c2117" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="label-box">
      <div class="item-name">كريم بروليه<br>بالفانيليا</div>
      <div class="item-price">16 د.ل</div>
    </div>
  </div>

  <!-- 4 -->
  <div class="dish">
    <div class="plate-shadow"></div>
    <div class="plate">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M34 30 L66 30 L63 78 L37 78 Z" fill="none" stroke="#c9c0af" stroke-width="1.6"/>
        <path d="M36.5 76 L63.5 76 L61.5 55 L38.5 55 Z" fill="#c99a63"/>
        <path d="M37.5 54 L62.5 54 L61 34 L39 34 Z" fill="#f0e6d3"/>
        <circle cx="42" cy="40" r="1.4" fill="#8a5a2c"/>
        <circle cx="50" cy="37" r="1.4" fill="#8a5a2c"/>
        <circle cx="58" cy="41" r="1.4" fill="#8a5a2c"/>
        <circle cx="46" cy="45" r="1.4" fill="#8a5a2c"/>
        <circle cx="55" cy="46" r="1.4" fill="#8a5a2c"/>
        <line x1="24" y1="70" x2="34" y2="66" stroke="#8a5a2c" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="label-box">
      <div class="item-name">تيراميسو<br>بالزنجبيل</div>
      <div class="item-price">17 د.ل</div>
    </div>
  </div>

  <!-- 5 -->
  <div class="dish">
    <div class="plate-shadow"></div>
    <div class="plate">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 78 L70 78 L58 26 L42 26 Z" fill="none" stroke="#c9c0af" stroke-width="1.4"/>
        <path d="M32 76 L68 76 L64 64 L36 64 Z" fill="#f4ede0"/>
        <path d="M35 62 L65 62 L62.5 50 L37.5 50 Z" fill="#f4ede0"/>
        <path d="M38 48 L62 48 L59.5 30 L40.5 30 Z" fill="#f4ede0"/>
        <rect x="34.5" y="62" width="31" height="2.5" fill="#c9536a"/>
        <rect x="37" y="48" width="26" height="2.5" fill="#c9536a"/>
        <circle cx="44" cy="27" r="2.6" fill="#b23a4e"/>
        <circle cx="50" cy="25" r="2.6" fill="#b23a4e"/>
        <circle cx="56" cy="27" r="2.6" fill="#b23a4e"/>
      </svg>
    </div>
    <div class="label-box">
      <div class="item-name">كيك التوت البري<br>بالشوكولاتة البيضاء</div>
      <div class="item-price">19 د.ل</div>
    </div>
  </div>

  <!-- 6 -->
  <div class="dish">
    <div class="plate-shadow"></div>
    <div class="plate">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="66" rx="30" ry="12" fill="none" stroke="#c9c0af" stroke-width="1.4"/>
        <ellipse cx="46" cy="62" rx="20" ry="8" fill="#5c3620"/>
        <path d="M34 60 C38 46 54 46 58 60 C54 66 38 66 34 60Z" fill="#8a5a2c"/>
        <circle cx="66" cy="58" r="9" fill="#f4ede0"/>
        <path d="M64 50 q2 -6 4 0" stroke="#5c7a4a" stroke-width="1.4" fill="none"/>
      </svg>
    </div>
    <div class="label-box">
      <div class="item-name">بودينغ التوفي<br>اللاصق</div>
      <div class="item-price">15 د.ل</div>
    </div>
  </div>

  <footer>هذا نموذج توضيحي فقط &mdash; يمكن استبدال الصور والأسماء والألوان بسهولة</footer>
</div>
</body>
</html>
