<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منيو مطعم لاقونا | Laguna Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Baloo+Bhaijaan+2:wght@500;700;800&family=Anton&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f2ede1;
    --cream-2:#e9e2d0;
    --ink:#2a2420;
    --line:#2a2420;
    --white:#fffdf8;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--cream);
    color:var(--ink);
    overflow-x:hidden;
    background-image:
      radial-gradient(circle at 8% 92%, rgba(42,36,32,0.05), transparent 35%),
      radial-gradient(circle at 95% 6%, rgba(42,36,32,0.05), transparent 35%);
  }

  /* ---------------- HERO ---------------- */
  .hero{
    padding:22px 20px 14px;
    max-width:640px;
    margin:0 auto;
  }
  .hero-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }
  .wordmark{
    font-family:'Baloo Bhaijaan 2', sans-serif;
    font-weight:800;
    font-size:1.5rem;
    letter-spacing:0.5px;
    border:3px solid var(--ink);
    padding:6px 14px;
    border-radius:10px;
    background:var(--white);
    transform:rotate(-2deg);
  }
  .doodle-face{width:52px;height:52px;flex-shrink:0;}
  .hero-menu{
    font-family:'Anton', sans-serif;
    font-size:clamp(3.4rem,18vw,5.2rem);
    line-height:0.85;
    letter-spacing:2px;
    margin-top:6px;
    text-align:left;
    direction:ltr;
  }
  .hero-tag{
    font-weight:700;
    font-size:0.85rem;
    color:var(--ink);
    opacity:0.7;
    margin-top:6px;
  }

  /* ---------------- SEARCH ---------------- */
  .search-wrap{
    max-width:640px;
    margin:10px auto 0;
    padding:0 20px;
    position:relative;
  }
  .search-box{
    width:100%;
    background:var(--white);
    border:3px solid var(--ink);
    border-radius:999px;
    padding:12px 46px 12px 18px;
    font-size:0.92rem;
    font-weight:600;
    color:var(--ink);
    outline:none;
  }
  .search-box::placeholder{color:#8a8175;}
  .search-icon{position:absolute;left:38px;top:50%;transform:translateY(-50%);font-size:1rem;opacity:0.7;}

  /* ---------------- CATEGORY CHIPS (quick jump) ---------------- */
  .chip-row{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:16px 20px 4px;
    max-width:640px;
    margin:0 auto;
  }
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;
    border:2.5px solid var(--ink);
    background:var(--white);
    border-radius:999px;
    padding:7px 14px;
    font-weight:700;
    font-size:0.78rem;
    display:flex;
    align-items:center;
    gap:5px;
    cursor:pointer;
    transition:0.2s;
  }
  .chip.active{background:var(--ink);color:var(--cream);}

  /* ---------------- CAROUSEL ---------------- */
  .pages-container{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    scroll-behavior:smooth;
    margin-top:10px;
  }
  .pages-container::-webkit-scrollbar{display:none;}

  .menu-page{
    min-width:100%;
    scroll-snap-align:start;
    padding:10px 20px 40px;
    max-width:640px;
    margin:0 auto;
  }

  .page-title-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:22px;
  }
  .page-badge{
    width:46px;height:46px;border-radius:50%;
    border:3px solid var(--ink);
    display:flex;align-items:center;justify-content:center;
    font-size:1.4rem;background:var(--white);flex-shrink:0;
  }
  .page-title{
    font-family:'Baloo Bhaijaan 2', sans-serif;
    font-weight:800;
    font-size:1.5rem;
  }
  .page-count{
    margin-right:auto;
    font-size:0.72rem;
    font-weight:700;
    border:2px solid var(--ink);
    border-radius:999px;
    padding:3px 10px;
    background:var(--white);
  }

  /* ---------------- ITEM ---------------- */
  .item{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:46px;
    position:relative;
  }
  .item.flip{flex-direction:row-reverse;}

  .item-visual{
    position:relative;
    width:38%;
    max-width:170px;
    aspect-ratio:1/1;
    flex-shrink:0;
  }
  .blob-svg{position:absolute;inset:-14%;width:128%;height:128%;}
  .item-icon-wrap{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
  }
  .item-icon-wrap svg{width:46%;height:46%;filter:drop-shadow(0 3px 4px rgba(0,0,0,0.2));}

  .starburst{
    position:absolute;
    width:64px;height:64px;
  }
  .starburst svg{width:100%;height:100%;}
  .starburst-price{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;
    color:var(--white);
    font-family:'Anton', sans-serif;
    font-size:0.95rem;
    line-height:1;
    direction:ltr;
  }
  .starburst-price small{font-size:0.5rem;font-weight:700;margin-top:1px;}

  .item.pos-a .starburst{top:-10px;left:-14px;}
  .item.pos-b .starburst{bottom:-10px;right:-14px;}

  .item-content{flex:1;min-width:0;}

  .pill-row{
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:8px;
  }
  .item.flip .pill-row{flex-direction:row-reverse;}
  .sparkle{width:14px;height:14px;flex-shrink:0;opacity:0.85;}
  .pill{
    font-family:'Baloo Bhaijaan 2', sans-serif;
    font-weight:700;
    font-size:0.92rem;
    border:2.5px solid var(--ink);
    border-radius:999px;
    padding:6px 14px;
    background:var(--white);
    display:inline-block;
    line-height:1.2;
  }
  .item-desc{
    font-size:0.8rem;
    color:#4a423b;
    line-height:1.55;
    max-width:95%;
  }

  /* ---------------- PAGER ---------------- */
  .pager{
    position:fixed;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--ink);
    padding:8px 10px;
    border-radius:999px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
    z-index:200;
  }
  .pager-btn{
    width:30px;height:30px;
    border-radius:50%;
    border:none;
    background:var(--cream);
    color:var(--ink);
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .dots{display:flex;gap:5px;padding:0 4px;}
  .dot{width:6px;height:6px;border-radius:50%;background:#6b6156;transition:0.2s;}
  .dot.active{background:var(--cream);width:16px;border-radius:4px;}

  /* ---------------- SEARCH RESULTS ---------------- */
  .search-results{
    max-width:640px;margin:14px auto 60px;padding:0 20px;
    display:none;
  }
  .search-results.show{display:block;}
  .pages-container.hide{display:none;}
  .chip-row.hide{display:none;}
  .pager.hide{display:none;}

  .sr-item{
    display:flex;justify-content:space-between;align-items:center;
    gap:10px;background:var(--white);border:2.5px solid var(--ink);
    border-radius:14px;padding:12px 14px;margin-bottom:10px;
  }
  .sr-name{font-weight:800;font-size:0.92rem;}
  .sr-desc{font-size:0.75rem;color:#5a524a;margin-top:2px;}
  .sr-price{
    font-family:'Anton', sans-serif;
    background:var(--ink);color:var(--cream);
    border-radius:999px;padding:6px 12px;font-size:0.85rem;flex-shrink:0;
    direction:ltr;
  }
  .no-results{text-align:center;padding:50px 20px;color:#6b6156;font-weight:700;}

  @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
</style>
</head>

function starburstPoints(spikes, outerR, innerR, cx, cy){
  let pts = [];
  const step = Math.PI / spikes;
  for(let i=0;i<spikes*2;i++){
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = i * step - Math.PI/2;
    pts.push(`${(cx + r*Math.cos(angle)).toFixed(1)},${(cy + r*Math.sin(angle)).toFixed(1)}`);
  }
  return pts.join(' ');
}

    { name:"وجبة كنتاكي 6 قطع", desc:"6 قطع دجاج + أرز + بطاطا + كول سلو + صوص", price:"55" },
    { name:"وجبة ستربس 5 قطع", desc:"5 قطع ستربس + أرز + بطاطا + كول سلو + صوص", price:"30" },
    { name:"وجبة ستربس 10 قطع", desc:"10 قطع ستربس + أرز + بطاطا + كول سلو + صوص", price:"55" }
  ]},
  { category:"سلطات ومقبلات", icon:"🥗", art:"salad", items:[
    { name:"شوربة عدس / حلقات بصل", desc:"مقبلات", price:"5" },
    { name:"بطاطا متوسطة / أصابع الجبنة", desc:"مقبلات", price:"10" },
    { name:"ناتشوز ببطاطا", desc:"مقبلات", price:"17" },
    { name:"سلطة بابا غنوج / مشوية", desc:"سلطات طازجة", price:"10" },
    { name:"سلطة الطماطم المتبل", desc:"سلطات طازجة", price:"19" },
    { name:"سلطة مشكل", desc:"تشكيلة سلطات", price:"25" }
  ]}
];

/* ============== BUILD ============== */
const chipRow = document.getElementById('chip-row');
const pagesContainer = document.getElementById('pages-container');
const dotsWrap = document.getElementById('dots');

menuData.forEach((cat, ci) => {
  const accent = palette[ci % palette.length];

  // chip
  const chip = document.createElement('div');
  chip.className = `chip ${ci===0?'active':''}`;
  chip.innerHTML = `<span>${cat.icon}</span><span>${cat.category}</span>`;
  chip.onclick = () => goToPage(ci);
  chipRow.appendChild(chip);

  // dot
  const dot = document.createElement('div');
  dot.className = `dot ${ci===0?'active':''}`;
  dotsWrap.appendChild(dot);

  // page
  const page = document.createElement('div');
  page.className = 'menu-page';
  page.innerHTML = `
    <div class="page-title-row">
      <div class="page-badge" style="border-color:${accent};color:${accent};">${cat.icon}</div>
      <h2 class="page-title" style="color:${accent};">${cat.category}</h2>
      <span class="page-count">${cat.items.length} صنف</span>
    </div>
  `;

  cat.items.forEach((item, i) => {
    const flip = i % 2 === 1;
    const posClass = i % 2 === 0 ? 'pos-a' : 'pos-b';
    const blob = blobPaths[i % blobPaths.length];
    const rotation = (i % 2 === 0 ? -6 : 5) + (i % 3) * 4;

    const el = document.createElement('div');
    el.className = `item ${flip ? 'flip':''} ${posClass}`;
    el.dataset.search = (item.name + ' ' + item.desc).toLowerCase();
    el.innerHTML = `
      <div class="item-visual" style="transform:rotate(${rotation}deg);">
        <svg class="blob-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <path d="${blob}" fill="${accent}" opacity="0.9"></path>
        </svg>
        <div class="item-icon-wrap" style="transform:rotate(${-rotation}deg);">${categoryIcons[cat.art]}</div>
        <div class="starburst">
          <svg viewBox="0 0 100 100"><polygon points="${starburstPolygon}" fill="var(--ink)"/></svg>
          <div class="starburst-price">${item.price}<small>د.ل</small></div>
        </div>
      </div>
      <div class="item-content">
        <div class="pill-row">
          <span class="sparkle">${sparkleSVG}</span>
          <span class="pill">${item.name}</span>
          <span class="sparkle">${sparkleSVG}</span>
        </div>
        <p class="item-desc">${item.desc}</p>
      </div>
    `;
    page.appendChild(el);
  });

  pagesContainer.appendChild(page);
});

/* ============== CAROUSEL LOGIC ============== */
const pages = document.querySelectorAll('.menu-page');
const chips = document.querySelectorAll('.chip');
const dots = document.querySelectorAll('.dot');
let currentPage = 0;

function goToPage(idx){
  idx = Math.max(0, Math.min(pages.length - 1, idx));
  pages[idx].scrollIntoView({ behavior:'smooth', inline:'start', block:'nearest' });
}

function updateActive(idx){
  currentPage = idx;
  chips.forEach((c,i)=>c.classList.toggle('active', i===idx));
  dots.forEach((d,i)=>d.classList.toggle('active', i===idx));
  chips[idx].scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

let scrollTimeout;
pagesContainer.addEventListener('scroll', () => {
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => {
    const idx = Math.round(pagesContainer.scrollLeft / pagesContainer.clientWidth);
    if (idx !== currentPage) updateActive(idx);
  }, 80);
});

document.getElementById('prev-btn').onclick = () => goToPage(currentPage + 1); // RTL: visually previous
document.getElementById('next-btn').onclick = () => goToPage(currentPage - 1);

/* ============== SEARCH ============== */
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
const noResults = document.getElementById('no-results');
const chipRowEl = document.getElementById('chip-row');
const pagerEl = document.getElementById('pager');

const allItems = [];
menuData.forEach(cat => cat.items.forEach(item => allItems.push({ ...item, category: cat.category })));

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();

  if (q === '') {
    pagesContainer.classList.remove('hide');
    chipRowEl.classList.remove('hide');
    pagerEl.classList.remove('hide');
    searchResults.classList.remove('show');
    noResults.style.display = 'none';
    return;
  }

  pagesContainer.classList.add('hide');
  chipRowEl.classList.add('hide');
  pagerEl.classList.add('hide');

  const matches = allItems.filter(it => (it.name + ' ' + it.desc).toLowerCase().includes(q));
  searchResults.innerHTML = matches.map(it => `
    <div class="sr-item">
      <div>
        <div class="sr-name">${it.name}</div>
        <div class="sr-desc">${it.desc}</div>
      </div>
      <div class="sr-price">${it.price} د.ل</div>
    </div>
  `).join('');

  searchResults.classList.toggle('show', matches.length > 0);
  noResults.style.display = matches.length === 0 ? 'block' : 'none';
});

updateActive(0);
</script>
</body>
</html>
